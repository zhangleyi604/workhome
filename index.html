<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人主页</title>

<style>

:root{
    --main:#2563eb;
    --text:#1f2937;
    --bg:#f8fafc;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    font-family:"Microsoft YaHei",sans-serif;
    color:var(--text);
    line-height:1.8;
}

.container{
    width:90%;
    max-width:1000px;
    margin:auto;
}

header{
    text-align:center;
    padding:80px 20px;
}

header h1{
    font-size:48px;
    margin-bottom:10px;
}

header p{
    color:#666;
}

section{
    margin:50px 0;
}

.section-title{
    font-size:28px;
    margin-bottom:20px;
    border-left:5px solid var(--main);
    padding-left:10px;
}

.card-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-content{
    padding:20px;
}

.card h3{
    margin-bottom:10px;
}

.btn{
    display:inline-block;
    margin-top:10px;
    text-decoration:none;
    background:var(--main);
    color:white;
    padding:8px 16px;
    border-radius:6px;
}

footer{
    text-align:center;
    padding:40px;
    color:#666;
}

</style>
</head>
<body>

    <div class="card-container">

        <div class="card">

            <img src="关系图.png">

                <p>

            </div>

        <div class="card">

                <p>

                </p>
                <a href="手写.jpg" class="btn">
                    查看PDF
                </a>

    </div>
</section>

</div>

<footer>
